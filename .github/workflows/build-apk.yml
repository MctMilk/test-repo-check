name: Build WirelessDisplay APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        
      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;23.1.7779620" 2>&1 | tail -5

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -30

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wireless-display-apk
          path: app/build/outputs/apk/debug/app-debug.apk
