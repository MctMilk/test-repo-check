name: Build WirelessDisplay APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: android-actions/setup-android@v2
        with: { sdk-dependencies: "build-tools;28.0.3,platforms;android-28" }
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with: { name: wireless-display-apk, path: app/build/outputs/apk/debug/app-debug.apk }
